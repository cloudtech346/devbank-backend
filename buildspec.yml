version: 0.2

phases:
  pre_build:
    commands:
      - echo Login to Amazon ECR
      - aws --version
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com

  build:
    commands:
      - echo Build started
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - docker build -t devbank-backend .
      - docker tag devbank-backend:latest $ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/devbank-backend:latest

  post_build:
    commands:
      - echo Push image
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - docker push $ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/devbank-backend:latest
      - echo '[{"name":"backend-container","imageUri":"'"$ACCOUNT_ID"'.dkr.ecr.us-east-1.amazonaws.com/devbank-backend:latest"}]' > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
